name: bott-analytics

services:
  postgres:
    image: postgres:17-alpine
    container_name: bott_analytics_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bott}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bott}
      POSTGRES_DB: ${POSTGRES_DB:-bott_analytics}
    ports:
      - "${POSTGRES_PORT:-5444}:5432"
    volumes:
      - bott_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bott_pg_data:
