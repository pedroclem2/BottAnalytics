name: bott-analytics-prod

# Self-contained production stack:
#   1. postgres — data store
#   2. web      — combined image: ETL bootstrap on boot, then Next.js
#
# Bring up locally with:
#   docker compose -f docker/docker-compose.prod.yml --env-file .env up --build

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bott}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bott}
      POSTGRES_DB: ${POSTGRES_DB:-bott_analytics}
    volumes:
      - bott_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5444}:5432"

  web:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL_INTERNAL:-postgresql://bott:bott@postgres:5432/bott_analytics}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  bott_pg_data:
